<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sindicato Oculto - Suministros</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&family=Space+Mono&display=swap');

        :root {
            --bg-principal: #0b0b0d; --bg-panel: #131317;
            --borde-sutil: #23232a; --color-texto: #e2e2e9;
            --color-oro: #c5a880; --color-ilegal: #88222d;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-principal); color: var(--color-texto); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; }

        /* ICONOS GENERADOS POR CSS (Sin dependencias de imagen) */
        .item-icon {
            width: 50px; height: 50px; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-family: 'Space Mono'; font-size: 1.5rem;
        }
        .icon-iron { background: #555; border: 2px solid #888; }
        .icon-prot { background: #3a5a40; border: 2px solid #52796f; }
        .icon-berry { background: #9b2226; border: 2px solid #bb3e03; border-radius: 50%; }
        .icon-pack { background: #1d3557; border: 2px solid #457b9d; }
        .icon-hack { background: #3f0d12; border: 2px solid #88222d; clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }

        /* ... MANTENGO EL RESTO DE ESTILOS ANTERIORES POR BREVEDAD ... */
        .fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; pointer-events: none; opacity: 0; }
        .fade-overlay.activo { opacity: 1; transition: opacity 0.5s ease-in-out; }
        .panel-elegante { background: var(--bg-panel); border: 1px solid var(--borde-sutil); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        h1 { font-family: 'Cinzel', serif; color: var(--color-oro); text-align: center; }
        .item-card { background: #18181f; border: 1px solid var(--borde-sutil); padding: 20px; text-align: center; }
        .btn-accion { background: var(--color-oro); border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

<div class="fade-overlay" id="capa-fundido"></div>

<div class="container">
    <!-- LOBBY -->
    <div id="pantalla-lobby" class="panel-elegante" style="max-width: 400px; margin: 100px auto;">
        <h1>SINDICATO</h1>
        <input type="text" id="login-nombre" placeholder="OPERADOR ID" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
        <button class="btn-accion" onclick="conectarLobby()">INICIAR SESIÓN</button>
    </div>

    <!-- MERCADO -->
    <div id="pantalla-mercado" style="display:none;">
        <div class="panel-elegante">
            <div id="lista-items" class="items-grid"></div>
        </div>
    </div>
</div>

<script>
// Base de datos actualizada con identificadores de iconos
const productos = [
    { id: 1, nombre: 'Hierro', iconClass: 'icon-iron', iconText: 'Fe', tienda: 'legal' },
    { id: 2, nombre: 'Proteína', iconClass: 'icon-prot', iconText: 'PRT', tienda: 'legal' },
    { id: 3, nombre: 'Baya Oran', iconClass: 'icon-berry', iconText: '●', tienda: 'legal' },
    { id: 4, nombre: 'Pack Suministros', iconClass: 'icon-pack', iconText: 'BOX', tienda: 'legal' },
    { id: 5, nombre: 'HACK: Escudo', iconClass: 'icon-hack', iconText: '!', tienda: 'illegal' }
];

function conectarLobby() {
    let nombre = document.getElementById('login-nombre').value.trim();
    if(!nombre) return;
    
    let capa = document.getElementById('capa-fundido');
    capa.classList.add('activo');
    
    setTimeout(() => {
        document.getElementById('pantalla-lobby').style.display = 'none';
        document.getElementById('pantalla-mercado').style.display = 'block';
        renderizar();
        capa.classList.remove('activo');
    }, 600);
}

function renderizar() {
    let grid = document.getElementById('lista-items');
    grid.innerHTML = '';
    productos.forEach(p => {
        grid.innerHTML += `
            <div class="item-card">
                <div class="item-icon ${p.iconClass}">${p.iconText}</div>
                <h4 style="color:var(--color-oro);">${p.nombre}</h4>
                <button class="btn-accion">ADQUIRIR</button>
            </div>
        `;
    });
}
</script>
</body>
</html>
